name: Sandbox

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize]
    paths-ignore:
      - "**.md"

permissions:
  contents: read

jobs:
  run_go_tests:
    name: "Go: Tests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.0.0
        with:
          go-version: '^1.25'

      - name: Run tests
        run: |
          set -o pipefail
          go test ./... | tee /tmp/go-test-output.txt

      - name: Go test summary
        continue-on-error: true
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const fs = require('fs');
            const testOutput = fs.readFileSync('/tmp/go-test-output.txt', 'utf8');
            core.summary
              .addCodeBlock(testOutput, 'go')
              .write();
